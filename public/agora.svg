<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    Agora logo: two clean speech bubbles, interlocked.
    Minimal, single-color, works on light & dark backgrounds.
  -->

  <!-- Primary bubble (top-left) -->
  <rect x="5" y="8" width="36" height="26" rx="8" fill="#0ea5e9"/>
  <!-- Tail pointing down-left -->
  <polygon points="12,34 8,44 24,34" fill="#0ea5e9"/>

  <!-- Secondary bubble (bottom-right), offset & slightly transparent -->
  <rect x="23" y="26" width="36" height="26" rx="8" fill="#0ea5e9" opacity="0.4"/>
  <!-- Tail pointing down-right -->
  <polygon points="52,52 56,44 40,52" fill="#0ea5e9" opacity="0.4"/>

  <!-- Three dots in primary bubble -->
  <circle cx="17" cy="21" r="2.5" fill="white"/>
  <circle cx="27" cy="21" r="2.5" fill="white"/>
  <circle cx="37" cy="21" r="2.5" fill="white" opacity="0.55"/>
</svg>
